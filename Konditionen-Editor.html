<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Konditionen-Editor</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --brand:#ff4d0d; --brand-ink:#c73a08; --brand-tint:#ffece4;
  --ink:#20232a; --muted:#6b7280; --line:#e4e7ec;
  --bg:#eceef1; --card:#ffffff; --ok:#188038; --radius:16px;
}
*{box-sizing:border-box;}
body{margin:0;padding:24px;background:var(--bg);color:var(--ink);
  font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif;-webkit-font-smoothing:antialiased;}
.wrap{max-width:960px;margin:auto;}
.header{position:relative;height:74px;background:var(--brand);color:#fff;border-radius:var(--radius) var(--radius) 0 0;
  display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:700;}
.backBtn{position:absolute;left:16px;width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;
  background:rgba(255,255,255,.2);text-decoration:none;transition:.2s;}
.backBtn:hover{background:#fff;}
.backBtn svg{width:18px;height:18px;fill:#fff;}
.backBtn:hover svg{fill:var(--brand);}
.sheet{background:var(--card);border-radius:0 0 var(--radius) var(--radius);padding:24px;box-shadow:0 12px 40px rgba(20,23,42,.08);}
.standline{font-size:13px;font-weight:600;color:var(--brand-ink);background:var(--brand-tint);
  display:inline-block;padding:6px 12px;border-radius:20px;margin-bottom:20px;}
.block{border:1px solid var(--line);border-radius:14px;padding:18px 20px;margin-bottom:18px;}
.block h2{font-size:16px;margin:0 0 16px;}
.grid2{display:grid;grid-template-columns:repeat(2,1fr);gap:16px;}
.grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;}
.field label{display:block;font-size:12px;font-weight:600;color:var(--muted);margin-bottom:6px;}
.iw{position:relative;}
.iw input{width:100%;height:42px;border:1px solid var(--line);border-radius:10px;padding:0 30px 0 12px;
  font-size:15px;font-weight:600;font-family:inherit;text-align:right;background:#fafbfc;color:var(--ink);font-variant-numeric:tabular-nums;}
.iw input:focus{outline:none;border:2px solid var(--brand);background:#fff;}
.iw .u{position:absolute;right:11px;top:50%;transform:translateY(-50%);font-size:12px;color:var(--muted);font-weight:600;pointer-events:none;}
.tblScroll{overflow-x:auto;}
table{border-collapse:collapse;width:100%;min-width:640px;}
th,td{padding:8px;text-align:center;}
thead th{font-size:11px;font-weight:700;color:var(--muted);border-bottom:1px solid var(--line);line-height:1.3;}
tbody th{font-size:12px;font-weight:700;text-align:left;white-space:nowrap;color:var(--ink);padding-right:12px;}
td input{width:72px;height:38px;border:1px solid var(--line);border-radius:9px;text-align:right;padding:0 8px;
  font-size:14px;font-weight:600;font-family:inherit;background:#fafbfc;color:var(--ink);font-variant-numeric:tabular-nums;}
td input:focus{outline:none;border:2px solid var(--brand);background:#fff;}
.subhead{font-size:13px;font-weight:700;margin:6px 0 10px;color:var(--brand-ink);}
.actions{position:sticky;bottom:0;margin-top:6px;padding:18px 0 4px;
  background:linear-gradient(to top,var(--card) 70%,rgba(255,255,255,0));display:flex;align-items:center;gap:16px;flex-wrap:wrap;}
.btn{border:none;background:var(--brand);color:#fff;font-family:inherit;font-size:15px;font-weight:700;
  padding:14px 24px;border-radius:12px;cursor:pointer;box-shadow:0 6px 16px rgba(255,77,13,.28);transition:.15s;}
.btn:hover{background:#e64404;transform:translateY(-1px);}
.status{font-size:13px;font-weight:600;color:var(--ok);opacity:0;transition:.2s;}
.status.show{opacity:1;}
@media(max-width:700px){body{padding:14px;}.grid2,.grid3{grid-template-columns:1fr;}}
</style>
</head>
<body>
<div class="wrap">
  <div class="header">
    <a href="index.html" class="backBtn" aria-label="Zurück"><svg viewBox="0 0 24 24"><path d="M15 18l-6-6 6-6"/></svg></a>
    Konditionen-Editor
  </div>
  <div class="sheet">
    <div class="standline">Zuletzt gespeichert: <span id="standAnzeige">—</span></div>

    <div class="block">
      <h2>Trend-Rendite</h2>
      <div class="grid3">
        <div class="field"><label>Trend-Rendite (% p. a.)</label><div class="iw"><input id="trend"><span class="u">%</span></div></div>
      </div>
    </div>

    <div class="block">
      <h2>Vorausdarlehen</h2>
      <div class="tblScroll">
        <table>
          <thead><tr>
            <th></th><th>ab<br>10 TEUR</th><th>ab<br>25 TEUR</th><th>ab<br>50 TEUR</th><th>ab<br>100 TEUR</th><th>ab<br>200 TEUR</th><th>ab<br>500 TEUR</th>
          </tr></thead>
          <tbody id="vdBody"></tbody>
        </table>
      </div>
    </div>

    <div class="block">
      <h2>Zwischenkredit</h2>
      <div class="grid3">
        <div class="field"><label>Zins ZK (% p. a.)</label><div class="iw"><input id="zk"><span class="u">%</span></div></div>
      </div>
    </div>

    <div class="block">
      <h2>Haushaltspauschale</h2>
      <div class="subhead">Ohne Mieteinnahmen</div>
      <div class="grid3">
        <div class="field"><label>1 Person</label><div class="iw"><input id="hp-o-p1"><span class="u">€</span></div></div>
        <div class="field"><label>2 Personen</label><div class="iw"><input id="hp-o-p2"><span class="u">€</span></div></div>
        <div class="field"><label>je weitere Person</label><div class="iw"><input id="hp-o-plus"><span class="u">€</span></div></div>
      </div>
      <div class="subhead" style="margin-top:16px">Mit Mieteinnahmen</div>
      <div class="grid3">
        <div class="field"><label>1 Person</label><div class="iw"><input id="hp-m-p1"><span class="u">€</span></div></div>
        <div class="field"><label>2 Personen</label><div class="iw"><input id="hp-m-p2"><span class="u">€</span></div></div>
        <div class="field"><label>je weitere Person</label><div class="iw"><input id="hp-m-plus"><span class="u">€</span></div></div>
      </div>
    </div>

    <div class="block">
      <h2>Ansatz laufender Darlehen</h2>
      <div class="grid2">
        <div class="field"><label>Wüstenrot-Darlehen</label><div class="iw"><input id="da-wuest"><span class="u">%</span></div></div>
        <div class="field"><label>Fremddarlehen</label><div class="iw"><input id="da-fremd"><span class="u">%</span></div></div>
      </div>
    </div>

    <div class="actions">
      <button class="btn" id="save">Speichern</button>
      <span class="status" id="status"></span>
    </div>
  </div>
</div>

<script src="konditionen.js"></script>
<script>
const DEF = {
  vd:{
    "24-35":[5.9,5.45,5.25,5.25,5.25,5.25],
    "36-47":[5.85,5.45,5.15,5.15,5.15,5.15],
    "48-60":[5.85,5.4,5.15,5.15,5.15,5.15],
    "61-120":[5.2,5.2,5.2,5.2,4.65,4.55],
    "121-180":[4.95,4.1,3.7,3.7,3.7,3.7]
  },
  zk:7.1, trend:2.16,
  haushaltspauschale:{ ohneMiete:{p1:890,p2:1230,jeWeiterePerson:255}, mitMiete:{p1:1340,p2:1680,jeWeiterePerson:255} },
  darlehensAnsatz:{wuestenrot:0.06,fremd:0.09}
};
const K = Object.assign({}, DEF, (window.KONDITIONEN||{}));
K.vd = Object.assign({}, DEF.vd, K.vd);
K.haushaltspauschale = {
  ohneMiete: Object.assign({}, DEF.haushaltspauschale.ohneMiete, (K.haushaltspauschale||{}).ohneMiete),
  mitMiete:  Object.assign({}, DEF.haushaltspauschale.mitMiete,  (K.haushaltspauschale||{}).mitMiete)
};
K.darlehensAnsatz = Object.assign({}, DEF.darlehensAnsatz, K.darlehensAnsatz);
const standAlt = (window.KONDITIONEN && window.KONDITIONEN.meta && window.KONDITIONEN.meta.stand) || "—";

const bands=["24-35","36-47","48-60","61-120","121-180"];
const bandLabel={"24-35":"24–35 Mon.","36-47":"36–47 Mon.","48-60":"48–60 Mon.","61-120":"61–120 Mon.","121-180":"121–180 Mon."};
const $=id=>document.getElementById(id);
const komma=n=>String(n).replace(".",",");
const zahl=v=>parseFloat(String(v).replace(/\./g,'').replace(',','.').replace(/[^\d.\-]/g,''))||0;

const body=$('vdBody');
bands.forEach(b=>{
  const tr=document.createElement('tr');
  tr.innerHTML='<th>'+bandLabel[b]+'</th>';
  (K.vd[b]||DEF.vd[b]).forEach((val,c)=>{
    const td=document.createElement('td');
    const inp=document.createElement('input');
    inp.id='vd-'+b+'-'+c; inp.value=komma(val); inp.inputMode='decimal';
    td.appendChild(inp); tr.appendChild(td);
  });
  body.appendChild(tr);
});

$('standAnzeige').textContent = standAlt;
$('trend').value=komma(K.trend);
$('zk').value=komma(K.zk);
$('hp-o-p1').value=K.haushaltspauschale.ohneMiete.p1;
$('hp-o-p2').value=K.haushaltspauschale.ohneMiete.p2;
$('hp-o-plus').value=K.haushaltspauschale.ohneMiete.jeWeiterePerson;
$('hp-m-p1').value=K.haushaltspauschale.mitMiete.p1;
$('hp-m-p2').value=K.haushaltspauschale.mitMiete.p2;
$('hp-m-plus').value=K.haushaltspauschale.mitMiete.jeWeiterePerson;
$('da-wuest').value=komma(+(K.darlehensAnsatz.wuestenrot*100).toFixed(2));
$('da-fremd').value=komma(+(K.darlehensAnsatz.fremd*100).toFixed(2));

function sammeln(){
  const vd={};
  bands.forEach(b=>{ vd[b]=[0,1,2,3,4,5].map(c=>zahl($('vd-'+b+'-'+c).value)); });
  return {
    meta:{ stand:"—" },
    vd,
    zk: zahl($('zk').value),
    trend: zahl($('trend').value),
    haushaltspauschale:{
      ohneMiete:{ p1:zahl($('hp-o-p1').value), p2:zahl($('hp-o-p2').value), jeWeiterePerson:zahl($('hp-o-plus').value) },
      mitMiete: { p1:zahl($('hp-m-p1').value), p2:zahl($('hp-m-p2').value), jeWeiterePerson:zahl($('hp-m-plus').value) }
    },
    darlehensAnsatz:{ wuestenrot:zahl($('da-wuest').value)/100, fremd:zahl($('da-fremd').value)/100 }
  };
}

function dateiText(k){
  return '/* KONDITIONEN – Stand: ' + k.meta.stand + ' */\n\n'
       + 'window.KONDITIONEN = ' + JSON.stringify(k, null, 2) + ';\n';
}

function meldung(t){ const s=$('status'); s.textContent=t; s.classList.add('show'); clearTimeout(meldung._t); meldung._t=setTimeout(()=>s.classList.remove('show'),6000); }

function download(text){
  const blob=new Blob([text],{type:'text/javascript'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a'); a.href=url; a.download='konditionen.js';
  document.body.appendChild(a); a.click(); a.remove(); URL.revokeObjectURL(url);
}

let dateiHandle=null;
async function speichern(){
  const k=sammeln();
  k.meta.stand=new Date().toLocaleString('de-DE',{day:'2-digit',month:'2-digit',year:'numeric',hour:'2-digit',minute:'2-digit'});
  const text=dateiText(k);
  try{
    if(window.showSaveFilePicker){
      if(!dateiHandle){
        dateiHandle=await window.showSaveFilePicker({suggestedName:'konditionen.js',
          types:[{description:'JavaScript-Datei',accept:{'text/javascript':['.js']}}]});
      }
      const w=await dateiHandle.createWritable(); await w.write(text); await w.close();
      $('standAnzeige').textContent=k.meta.stand;
      meldung('Gespeichert · '+k.meta.stand);
      return;
    }
  }catch(e){ if(e && e.name==='AbortError') return; }
  download(text);
  $('standAnzeige').textContent=k.meta.stand;
  meldung('Heruntergeladen · im Ordner ersetzen · '+k.meta.stand);
}
$('save').addEventListener('click', speichern);
</script>
</body>
</html>
